# Triggers your app's ingest/pipeline via HTTP.
# Add repo secrets: INGEST_URL (e.g. https://signaldesk-chi.vercel.app), CRON_SECRET.
name: Fetch news (RSS) and run pipeline

on:
  schedule:
    - cron: "0 14 * * *"   # 14:00 UTC daily
  workflow_dispatch:

jobs:
  fetch-and-ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.INGEST_URL }}" ]; then
            echo "::error::Repository secret INGEST_URL is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::Repository secret CRON_SECRET is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Secrets present (INGEST_URL, CRON_SECRET)."

      - name: Call ingest-news cron (RSS ingest)
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Repository secret CRON_SECRET is not set."
            exit 1
          fi
          BASE_URL="$INGEST_URL"
          case "$BASE_URL" in
            http://*|https://*) ;;
            *) BASE_URL="https://$BASE_URL" ;;
          esac
          echo "Calling $BASE_URL/api/cron/ingest-news"
          curl -sS -L -f -H "Authorization: Bearer $CRON_SECRET" -H "Accept: application/json" "$BASE_URL/api/cron/ingest-news"

      - name: Run ML pipeline (part 1)
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Repository secret CRON_SECRET is not set."
            exit 1
          fi
          BASE_URL="$INGEST_URL"
          case "$BASE_URL" in
            http://*|https://*) ;;
            *) BASE_URL="https://$BASE_URL" ;;
          esac
          echo "Calling $BASE_URL/api/cron/run-pipeline?part=1"
          curl -sS -L -f -H "Authorization: Bearer $CRON_SECRET" -H "Accept: application/json" "$BASE_URL/api/cron/run-pipeline?part=1"

      - name: Run ML pipeline (part 2)
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Repository secret CRON_SECRET is not set."
            exit 1
          fi
          BASE_URL="$INGEST_URL"
          case "$BASE_URL" in
            http://*|https://*) ;;
            *) BASE_URL="https://$BASE_URL" ;;
          esac
          echo "Calling $BASE_URL/api/cron/run-pipeline?part=2"
          curl -sS -L -f -H "Authorization: Bearer $CRON_SECRET" -H "Accept: application/json" "$BASE_URL/api/cron/run-pipeline?part=2"

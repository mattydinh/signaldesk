# Fetches from News API and POSTs articles to your app's ingest endpoint.
# Add repo secrets: NEWS_API_KEY, INGEST_URL (e.g. https://signaldesk-chi.vercel.app), INGEST_API_KEY (optional).
# Note: News API free tier may block/restrict requests from GitHub; running the script locally is more reliable.
name: Fetch news and post to app

on:
  schedule:
    - cron: "0 14 * * *"   # 14:00 UTC daily
  workflow_dispatch:

jobs:
  fetch-and-ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.NEWS_API_KEY }}" ]; then
            echo "::error::Repository secret NEWS_API_KEY is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${{ secrets.INGEST_URL }}" ]; then
            echo "::error::Repository secret INGEST_URL is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Secrets present (NEWS_API_KEY, INGEST_URL)."

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Fetch news and POST to app
        env:
          CI: "true"
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          node scripts/fetch-news-dev.mjs 2>&1
          EXIT=$?
          if [ $EXIT -ne 0 ]; then
            echo "::error::Fetch or ingest failed (exit $EXIT). Scroll up in this step to see the script error."
          fi
          exit $EXIT

      - name: Run ML pipeline (part 1)
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Repository secret CRON_SECRET is not set."
            exit 1
          fi
          echo "Calling $INGEST_URL/api/cron/run-pipeline?part=1"
          curl -sS -f -H "Authorization: Bearer $CRON_SECRET" "$INGEST_URL/api/cron/run-pipeline?part=1"

      - name: Run ML pipeline (part 2)
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Repository secret CRON_SECRET is not set."
            exit 1
          fi
          echo "Calling $INGEST_URL/api/cron/run-pipeline?part=2"
          curl -sS -f -H "Authorization: Bearer $CRON_SECRET" "$INGEST_URL/api/cron/run-pipeline?part=2"
